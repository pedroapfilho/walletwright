name: Test
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true
      # Unit tests only. The demo wallet E2E needs a headed browser (see apps/demo);
      # run it locally or under a virtual display, not on this gate.
      - run: pnpm turbo run test --filter=walletwright
